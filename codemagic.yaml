workflows:
  android-workflow:
    name: RecuerdameApp Android
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Android SDK
        script: | 
          echo "sdk.dir=$ANDROID_SDK_ROOT" > RecuerdameApp/local.properties
      - name: Build APK debug
        script: | 
          cd RecuerdameApp
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - RecuerdameApp/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - larioschristopher13@gmail.com
